<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hangar 23 - Pedidos</title>

<style>

body{
font-family: Arial;
background:#e5e5e5;
margin:0;
}

header{
background:#ffcc00;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
background:#ffcc00;
border:none;
padding:10px;
margin-top:10px;
width:100%;
font-size:18px;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
HANGAR 23 PEDIDOS
</header>

<div class="container">

<div class="card">

<label>Nombre cliente</label>
<input id="cliente">

<label>Domicilio</label>
<input id="domicilio">

<label>Hamburguesa</label>
<select id="burger">

<option value="12000">B737 Simple</option>
<option value="14000">B737 Doble</option>

<option value="13000">FL100 Simple</option>
<option value="14000">FL100 Doble</option>

<option value="13500">Smoke Simple</option>
<option value="14500">Smoke Doble</option>

<option value="12000">Cheese H23 Simple</option>
<option value="13000">Cheese H23 Doble</option>

</select>

<button onclick="agregarPedido()">Agregar pedido</button>

<button onclick="borrarPedidos()">Borrar pedidos del día</button>

</div>


<div class="card">

<h2>Pedidos cargados</h2>

<ul id="lista"></ul>

<h2>Total ventas: $<span id="total">0</span></h2>

</div>

</div>


<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let total = 0;


function renderPedidos(){

let lista=document.getElementById("lista");

lista.innerHTML="";

total=0;

pedidos.forEach(p => {

let item=document.createElement("li");

item.innerText=p;

lista.appendChild(item);

let precio=parseInt(p.split("$")[1]);

total+=precio;

});

document.getElementById("total").innerText=total;

}



function agregarPedido(){

let cliente=document.getElementById("cliente").value;

let domicilio=document.getElementById("domicilio").value;


if(cliente=="" || domicilio==""){

alert("Completá cliente y domicilio");

return;

}


let burger=document.getElementById("burger");

let precio=parseInt(burger.value);

let nombreBurger=burger.options[burger.selectedIndex].text;


let pedidoTexto=

cliente+" - "+domicilio+" - "+nombreBurger+" $" +precio;


pedidos.push(pedidoTexto);


// guardar en Firebase

if(typeof guardarPedido==="function"){

guardarPedido({

cliente:cliente,

domicilio:domicilio,

hamburguesa:nombreBurger,

precio:precio,

fecha:new Date().toLocaleString()

});

}


localStorage.setItem("pedidos", JSON.stringify(pedidos));


renderPedidos();

}



function borrarPedidos(){

if(confirm("¿Seguro querés borrar todos los pedidos?")){

pedidos=[];

localStorage.removeItem("pedidos");

renderPedidos();

}

}


renderPedidos();

</script>



<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";


import {
getFirestore,
collection,
addDoc,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBOYQZZkcR_f7jBvweSnauOzPe92dsH060",

authDomain: "hangar23-668af.firebaseapp.com",

projectId: "hangar23-668af",

storageBucket: "hangar23-668af.firebasestorage.app",

messagingSenderId: "414862836972",

appId: "1:414862836972:web:cfb242464ea55757f751c9"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



window.guardarPedido = async function(pedido){

try{

await addDoc(collection(db,"pedidos"), pedido);

console.log("Pedido guardado correctamente");

}

catch(error){

console.error("Error guardando pedido:", error);

}

};

</script>


</body>
</html>
